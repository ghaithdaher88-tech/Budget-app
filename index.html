<script type="text/babel">

    namePlaceholder: "الاسم", budgetPlaceholder: "الميزانية", add2: "إضافة",

    reportPrompt: (month, income, fixedT, totalS, rem, rows, exps) =>
      `أنت مستشار مالي. اكتب تقرير ميزانية شهري احترافي بالعربية لشهر ${month}. الراتب: ${income} | الثابت: ${fixedT} | المنفق: ${totalS} | المتبقي: ${rem}. البنود: ${rows}. المصاريف: ${exps}. اكتب: ١-ملخص ٢-أبرز الملاحظات ٣-البنود المتجاوزة ٤-نصائح للشهر القادم`,
  },
  en: {
    dir: "ltr", font: "'Inter',sans-serif",
    appName: "My Monthly Budget", salary: "Salary", currentMonth: "Current Month", pastMonth: "Past Month",
    dashboard: "Dashboard", add: "Add", history: "History", report: "Report", settings: "Settings",
    fixed: "Fixed", spent: "Spent", remaining: "Remaining",
    variableBudgets: "Variable Budgets", fixedExpenses: "Fixed Expenses", total: "Total",
    addExpense: "Add Expense", desc: "Description", amount: "Amount", category: "Category", date: "Date",
    saveExpense: "✅ Save Expense", saving: "⏳ Saving...", saved: "✅ Saved", autoSaved: "💾 Auto-saved",
    descPlaceholder: "e.g. Supermarket", amountPlaceholder: "0.00",
    errorDesc: "Enter a description", errorAmount: "Enter a valid amount",
    noExpenses: "No expenses this month", addFirst: "➕ Add first expense",
    ops: "transactions", delete: "Delete",
    reportTitle: "Monthly Report", refresh: "🔄 Refresh", print: "🖨️ PDF",
    monthSummary: "Month Summary", budgetDetails: "Budget Details", aiAnalysis: "AI Analysis",
    createAnalysis: "🤖 Generate Analysis", analyzing: "⏳ Analyzing...",
    budget: "Budget", status: "Status", withinBudget: "✅ Within", exceeded: "⚠️ Exceeded",
    gmailReport: "Weekly Gmail Report", gmailDesc: "Create a ready draft in your inbox",
    gmailSend: "📤 Send", gmailSending: "⏳...", gmailSuccess: "✅ Done!", gmailError: "❌ Error",
    gmailDone: "✅ Draft ready in Gmail!", gmailFail: "⚠️ Failed, try again.",
    settingsTitle: "Settings", monthlySalary: "💵 Monthly Salary", edit: "Edit", cancel: "Cancel", save: "Save",
    fixedBudgets: "📌 Fixed Expenses", variableCategories: "📂 Variable Categories",
    addFixed: "➕ Add Fixed Item", addVariable: "➕ Add Variable Item",

    language: "🌐 Language", theme: "🎨 Theme",
    overBy: "Over by", leftOf: "Left",
    months: ["January","February","March","April","May","June","July","August","September","October","November","December"],
    reportPrompt: (month, income, fixedT, totalS, rem, rows, exps) =>
      `You are a financial advisor. Write a professional monthly budget report in English for ${month}. Income: ${income} | Fixed: ${fixedT} | Spent: ${totalS} | Remaining: ${rem}. Categories: ${rows}. Expenses: ${exps}. Write: 1-Summary 2-Key observations 3-Exceeded budgets 4-Tips for next month`,
  },
  de: {
    dir: "ltr", font: "'Inter',sans-serif",
    appName: "Mein Monatsbudget", salary: "Gehalt", currentMonth: "Aktueller Monat", pastMonth: "Vergangener Monat",
    dashboard: "Übersicht", add: "Hinzufügen", history: "Verlauf", report: "Bericht", settings: "Einstellungen",
    fixed: "Fix", spent: "Ausgegeben", remaining: "Verbleibend",
    variableBudgets: "Variable Budgets", fixedExpenses: "Fixkosten", total: "Gesamt",
    addExpense: "Ausgabe hinzufügen", desc: "Beschreibung", amount: "Betrag", category: "Kategorie", date: "Datum",
    saveExpense: "✅ Speichern", saving: "⏳ Speichern...", saved: "✅ Gespeichert", autoSaved: "💾 Automatisch gespeichert",
    descPlaceholder: "z.B. Supermarkt", amountPlaceholder: "0.00",
    errorDesc: "Beschreibung eingeben", errorAmount: "Gültigen Betrag eingeben",
    noExpenses: "Keine Ausgaben diesen Monat", addFirst: "➕ Erste Ausgabe hinzufügen",
    ops: "Transaktionen", delete: "Löschen",
    reportTitle: "Monatsbericht", refresh: "🔄 Aktualisieren", print: "🖨️ PDF",
    monthSummary: "Monatsübersicht", budgetDetails: "Budgetdetails", aiAnalysis: "KI-Analyse",
    createAnalysis: "🤖 Analyse erstellen", analyzing: "⏳ Analysiere...",
    budget: "Budget", status: "Status", withinBudget: "✅ Im Rahmen", exceeded: "⚠️ Überschritten",
    gmailReport: "Wöchentlicher Gmail-Bericht", gmailDesc: "Entwurf in deinem Postfach erstellen",
    gmailSend: "📤 Senden", gmailSending: "⏳...", gmailSuccess: "✅ Fertig!", gmailError: "❌ Fehler",
    gmailDone: "✅ Entwurf in Gmail bereit!", gmailFail: "⚠️ Fehler, bitte erneut versuchen.",
    settingsTitle: "Einstellungen", monthlySalary: "💵 Monatsgehalt", edit: "Bearbeiten", cancel: "Abbrechen", save: "Speichern",
    fixedBudgets: "📌 Fixkosten", variableCategories: "📂 Variable Kategorien",
    addFixed: "➕ Fixkosten hinzufügen", addVariable: "➕ Variable Kategorie hinzufügen",
    namePlaceholder: "Name", budgetPlaceholder: "Budget", add2: "Hinzufügen",
    language: "🌐 Sprache", theme: "🎨 Design",
    overBy: "Überschritten um", leftOf: "Verbleibend",
    months: ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"],
    reportPrompt: (month, income, fixedT, totalS, rem, rows, exps) =>
      `Du bist ein Finanzberater. Schreibe einen professionellen Monatsbericht auf Deutsch für ${month}. Gehalt: ${income} | Fix: ${fixedT} | Ausgegeben: ${totalS} | Verbleibend: ${rem}. Kategorien: ${rows}. Ausgaben: ${exps}. Schreibe: 1-Zusammenfassung 2-Wichtige Beobachtungen 3-Überschrittene Budgets 4-Tipps für nächsten Monat`,
  }
};

// ============ THEMES ============
const THEMES = {
  dark:    { name: {ar:"داكن",en:"Dark",de:"Dunkel"},       bg:"linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%)", surface:"rgba(255,255,255,0.04)", border:"rgba(255,255,255,0.08)", text:"#e2e8f0", subtext:"#94a3b8", headerBg:"rgba(255,255,255,0.04)" },
  light:   { name: {ar:"فاتح",en:"Light",de:"Hell"},         bg:"linear-gradient(135deg,#f0f4ff 0%,#e8eaf6 50%,#f0f4ff 100%)", surface:"rgba(255,255,255,0.8)", border:"rgba(0,0,0,0.08)", text:"#1e293b", subtext:"#64748b", headerBg:"rgba(255,255,255,0.9)" },
  green:   { name: {ar:"أخضر",en:"Green",de:"Grün"},         bg:"linear-gradient(135deg,#052e16 0%,#064e3b 50%,#052e16 100%)", surface:"rgba(255,255,255,0.05)", border:"rgba(255,255,255,0.1)", text:"#ecfdf5", subtext:"#6ee7b7", headerBg:"rgba(255,255,255,0.05)" },
  purple:  { name: {ar:"بنفسجي",en:"Purple",de:"Lila"},      bg:"linear-gradient(135deg,#1e0a3c 0%,#3b0764 50%,#1e0a3c 100%)", surface:"rgba(255,255,255,0.05)", border:"rgba(255,255,255,0.1)", text:"#f3e8ff", subtext:"#c4b5fd", headerBg:"rgba(255,255,255,0.05)" },
  ocean:   { name: {ar:"محيطي",en:"Ocean",de:"Ozean"},       bg:"linear-gradient(135deg,#0c1a2e 0%,#0e3a5f 50%,#0c1a2e 100%)", surface:"rgba(255,255,255,0.05)", border:"rgba(255,255,255,0.1)", text:"#e0f2fe", subtext:"#7dd3fc", headerBg:"rgba(255,255,255,0.05)" },
  sunset:  { name: {ar:"غروب",en:"Sunset",de:"Sonnenuntergang"}, bg:"linear-gradient(135deg,#1c0a00 0%,#7c2d12 50%,#1c0a00 100%)", surface:"rgba(255,255,255,0.05)", border:"rgba(255,255,255,0.1)", text:"#fff7ed", subtext:"#fdba74", headerBg:"rgba(255,255,255,0.05)" },
};

const DEFAULT_CONFIG = {
  income: 1350,
  fixed: [
    { id:1, name:"كرت مواصلات", amount:88 },
    { id:2, name:"إنترنت", amount:25 },
    { id:3, name:"تأمين سيارة", amount:81 },
    { id:4, name:"كهرباء", amount:70 },
    { id:5, name:"أقساط", amount:95 },
  ],
  variable: [
    { id:10, name:"طعام ومشتريات", budget:400, color:"#f59e0b", icon:"🛒" },
    { id:11, name:"تعبئة وقود", budget:120, color:"#3b82f6", icon:"⛽" },
    { id:12, name:"مصاريف متغيرة أخرى", budget:261, color:"#8b5cf6", icon:"💳" },
    { id:13, name:"طوارئ", budget:87, color:"#ef4444", icon:"🚨" },
    { id:14, name:"توفير", budget:123, color:"#10b981", icon:"💰" },
  ],
};

const ICONS = ["🛒","⛽","💳","🚨","💰","🏠","🎓","🍔","💊","✈️","👕","📱","🎮","🐾","🧾"];
const COLORS = ["#f59e0b","#3b82f6","#8b5cf6","#ef4444","#10b981","#ec4899","#06b6d4","#f97316","#84cc16","#6366f1"];

function getMonthKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;}
function getMonthLabel(k,lang){const[y,m]=k.split("-");return `${T[lang].months[parseInt(m)-1]} ${y}`;}
function lsGet(key,fb){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fb;}catch{return fb;}}
function lsSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}

function App(){
  const now = new Date();
  const currentKey = getMonthKey(now);

  const [lang, setLang] = useState(()=>lsGet("budget_lang","ar"));
  const [theme, setTheme] = useState(()=>lsGet("budget_theme","dark"));
  const [config, setConfig] = useState(()=>lsGet("budget_config",DEFAULT_CONFIG));
  const [allData, setAllData] = useState(()=>lsGet("budget_data",{}));
  const [selectedMonth, setSelectedMonth] = useState(currentKey);
  const [activeTab, setActiveTab] = useState("dashboard");
  const [showMonthPicker, setShowMonthPicker] = useState(false);
  const [saveFlash, setSaveFlash] = useState("");

  const [editIncome, setEditIncome] = useState(false);
  const [incomeInput, setIncomeInput] = useState(config.income);
  const [newFixed, setNewFixed] = useState({name:"",amount:""});
  const [newVar, setNewVar] = useState({name:"",budget:"",icon:"💳",color:"#8b5cf6"});
  const [editingFixed, setEditingFixed] = useState(null);
  const [editingVar, setEditingVar] = useState(null);
  const [settingsMsg, setSettingsMsg] = useState("");

  const [form, setForm] = useState({desc:"",amount:"",category:config.variable[0]?.name||"",date:now.toISOString().split("T")[0]});
  const [formError, setFormError] = useState("");

  const [reportText, setReportText] = useState("");
  const [reportLoading, setReportLoading] = useState(false);
  const [gmailStatus, setGmailStatus] = useState("");

  const t = T[lang];
  const th = THEMES[theme];

  useEffect(()=>{
    document.documentElement.dir = t.dir;
    document.documentElement.lang = lang;
  },[lang]);

  const expenses = allData[selectedMonth]||[];
  const totalFixed = config.fixed.reduce((s,i)=>s+i.amount,0);
  const totalVarBudget = config.variable.reduce((s,i)=>s+i.budget,0);
  const totalSpent = expenses.reduce((s,e)=>s+e.amount,0);
  const remaining = totalVarBudget-totalSpent;
  const spent = (cat)=>expenses.filter(e=>e.category===cat).reduce((s,e)=>s+e.amount,0);

  const flash = (msg)=>{setSettingsMsg(msg);setTimeout(()=>setSettingsMsg(""),2500);};
  const flashSave = ()=>{setSaveFlash(t.saved);setTimeout(()=>setSaveFlash(""),2000);};

  const changeLang = (l)=>{ setLang(l); lsSet("budget_lang",l); };
  const changeTheme = (th)=>{ setTheme(th); lsSet("budget_theme",th); };

  const persistConfig=(c)=>{setConfig(c);lsSet("budget_config",c);flash(t.saved);};
  const persistData=(d)=>{setAllData(d);lsSet("budget_data",d);flashSave();};

  const allMonths=[...new Set([...Object.keys(allData).filter(k=>(allData[k]||[]).length>0),currentKey])].sort((a,b)=>b.localeCompare(a));

  const addExpense=()=>{
    if(!form.desc.trim()){setFormError(t.errorDesc);return;}
    if(!form.amount||isNaN(form.amount)||Number(form.amount)<=0){setFormError(t.errorAmount);return;}
    const updated={...allData,[selectedMonth]:[{id:Date.now(),...form,amount:Number(form.amount)},...(allData[selectedMonth]||[])]};
    persistData(updated);
    setForm({desc:"",amount:"",category:config.variable[0]?.name||"",date:now.toISOString().split("T")[0]});
    setFormError("");setActiveTab("dashboard");
  };
  const deleteExpense=(id)=>persistData({...allData,[selectedMonth]:expenses.filter(e=>e.id!==id)});

  const updateIncome=()=>{persistConfig({...config,income:Number(incomeInput)});setEditIncome(false);};
  const addFixed=()=>{if(!newFixed.name.trim()||!newFixed.amount||isNaN(newFixed.amount))return;persistConfig({...config,fixed:[...config.fixed,{id:Date.now(),name:newFixed.name.trim(),amount:Number(newFixed.amount)}]});setNewFixed({name:"",amount:""});};
  const deleteFixed=(id)=>persistConfig({...config,fixed:config.fixed.filter(f=>f.id!==id)});
  const saveEditFixed=()=>{persistConfig({...config,fixed:config.fixed.map(f=>f.id===editingFixed.id?{...f,name:editingFixed.name,amount:Number(editingFixed.amount)}:f)});setEditingFixed(null);};
  const addVar=()=>{if(!newVar.name.trim()||!newVar.budget||isNaN(newVar.budget))return;persistConfig({...config,variable:[...config.variable,{id:Date.now(),name:newVar.name.trim(),budget:Number(newVar.budget),icon:newVar.icon,color:newVar.color}]});setNewVar({name:"",budget:"",icon:"💳",color:"#8b5cf6"});};
  const deleteVar=(id)=>persistConfig({...config,variable:config.variable.filter(v=>v.id!==id)});
  const saveEditVar=()=>{persistConfig({...config,variable:config.variable.map(v=>v.id===editingVar.id?{...v,...editingVar,budget:Number(editingVar.budget)}:v)});setEditingVar(null);};

  const generateReport=async()=>{
    setReportLoading(true);setReportText("");
    const rows=config.variable.map(v=>`${v.name}: ${t.budget} ${v.budget}, ${t.spent} ${spent(v.name).toFixed(2)}, ${t.remaining} ${(v.budget-spent(v.name)).toFixed(2)}`).join(" | ");
    const exps=expenses.slice(0,20).map(e=>`${e.date}: ${e.desc} ${e.amount}`).join(" | ");
    const prompt=t.reportPrompt(getMonthLabel(selectedMonth,lang),config.income,totalFixed,totalSpent.toFixed(2),remaining.toFixed(2),rows,exps);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      setReportText(data.content?.map(i=>i.text||"").join("")||"Error");
    }catch{setReportText("Error generating report.");}
    setReportLoading(false);
  };

  const sendGmailDraft=async()=>{
    setGmailStatus("loading");
    const rows=config.variable.map(v=>`• ${v.name}: ${v.budget} / ${spent(v.name).toFixed(2)} ${spent(v.name)>v.budget?"⚠️":"✅"}`).join("\n");
    const body=`${t.appName} - ${getMonthLabel(selectedMonth,lang)}\n\n${t.salary}: ${config.income} | ${t.fixed}: ${totalFixed} | ${t.spent}: ${totalSpent.toFixed(2)} | ${t.remaining}: ${remaining.toFixed(2)}\n\n${rows}\n\n${expenses.slice(0,20).map(e=>`• ${e.date} | ${e.desc} | ${e.amount}`).join("\n")}`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,mcp_servers:[{type:"url",url:"https://gmailmcp.googleapis.com/mcp/v1",name:"gmail"}],messages:[{role:"user",content:`Create Gmail draft: subject="${t.appName} - ${getMonthLabel(selectedMonth,lang)}", body="${body}". Reply: SUCCESS or FAILED`}]})});
      const data=await res.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"";
      setGmailStatus(text.toLowerCase().includes("success")?"success":"error");
    }catch{setGmailStatus("error");}
    setTimeout(()=>setGmailStatus(""),4000);
  };

  // Styles
  const C=(extra={})=>({background:th.surface,border:`1px solid ${th.border}`,borderRadius:16,padding:16,...extra});
  const I=(extra={})=>({width:"100%",background:th.surface,border:`1px solid ${th.border}`,borderRadius:10,padding:"9px 12px",color:th.text,fontSize:13,fontFamily:t.font,outline:"none",boxSizing:"border-box",...extra});
  const B=(bg,extra={})=>({background:bg,border:"none",borderRadius:9,padding:"8px 14px",color:"#fff",fontSize:12,fontFamily:t.font,fontWeight:700,cursor:"pointer",...extra});

  const TABS=[["dashboard","📊"],["add","➕"],["history","📋"],["report","📄"],["settings","⚙️"]];
  const TL={dashboard:t.dashboard,add:t.add,history:t.history,report:t.report,settings:t.settings};

  return (
    <div className="theme-transition" style={{direction:t.dir,fontFamily:t.font,minHeight:"100vh",background:th.bg,color:th.text}}>

      {/* Header */}
      <div className="no-print" style={{background:th.headerBg,borderBottom:`1px solid ${th.border}`,padding:"14px 18px",backdropFilter:"blur(20px)"}}>
        <div style={{maxWidth:620,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div>
              <h1 style={{margin:0,fontSize:19,fontWeight:900,background:"linear-gradient(90deg,#a78bfa,#60a5fa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{t.appName}</h1>
              <span style={{fontSize:10,color:"#10b981"}}>{saveFlash||t.autoSaved}</span>
            </div>
            <div style={{background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.3)",borderRadius:10,padding:"6px 14px",textAlign:"center"}}>
              <p style={{margin:0,fontSize:10,color:"#6ee7b7"}}>{t.salary}</p>

                    </div>
                  ):(
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.03)",borderRadius:9,padding:"8px 12px"}}>
                      <span style={{fontSize:13,color:th.text}}>{v.icon} {v.name} <span style={{color:v.color,fontWeight:700}}>({v.budget})</span></span>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setEditingVar({...v})} style={B("rgba(124,58,237,0.2)",{color:"#c4b5fd",border:"1px solid rgba(124,58,237,0.3)",padding:"4px 10px"})}>✏️</button>
                        <button onClick={()=>deleteVar(v.id)} style={B("rgba(239,68,68,0.15)",{color:"#fca5a5",border:"1px solid rgba(239,68,68,0.3)",padding:"4px 10px"})}>🗑️</button>
                      </div>
                    </div>
                  )}
                </div>
              ))}
              <div style={{borderTop:`1px solid ${th.border}`,paddingTop:10,marginTop:6}}>
                <p style={{margin:"0 0 7px",fontSize:12,color:th.subtext}}>{t.addVariable}</p>
                <div style={{display:"flex",gap:6,marginBottom:7}}>
                  <input placeholder={t.namePlaceholder} value={newVar.name} onChange={e=>setNewVar({...newVar,name:e.target.value})} style={{...I(),flex:2}}/>
                  <input type="number" placeholder={t.budgetPlaceholder} value={newVar.budget} onChange={e=>setNewVar({...newVar,budget:e.target.value})} style={{...I(),flex:1}}/>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:7}}>
                  {ICONS.map(ic=><button key={ic} onClick={()=>setNewVar({...newVar,icon:ic})} style={{background:newVar.icon===ic?"rgba(124,58,237,0.4)":"rgba(255,255,255,0.05)",border:newVar.icon===ic?"1px solid #7c3aed":"1px solid transparent",borderRadius:6,padding:"4px 6px",cursor:"pointer",fontSize:14}}>{ic}</button>)}
                </div>
                <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
                  {COLORS.map(c=><button key={c} onClick={()=>setNewVar({...newVar,color:c})} style={{width:22,height:22,borderRadius:"50%",background:c,border:newVar.color===c?"2px solid white":"2px solid transparent",cursor:"pointer"}}/>)}
                </div>
                <button onClick={addVar} style={B("linear-gradient(135deg,#7c3aed,#2563eb)",{width:"100%",padding:"10px",fontSize:13,borderRadius:10})}>{t.addVariable}</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
