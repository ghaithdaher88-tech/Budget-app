<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ميزانيتي">
  <title>ميزانيتي الشهرية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0f172a;font-family:'Cairo',sans-serif;direction:rtl;}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
    select option{background:#1e1b4b;color:#e2e8f0;}
    @media print{.no-print{display:none!important}.print-area{background:white!important;color:black!important;padding:20px!important;}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const DEFAULT_CONFIG = {
  income: 1350,
  fixed: [
    { id: 1, name: "كرت مواصلات", amount: 88 },
    { id: 2, name: "إنترنت", amount: 25 },
    { id: 3, name: "تأمين سيارة", amount: 81 },
    { id: 4, name: "كهرباء", amount: 70 },
    { id: 5, name: "أقساط", amount: 95 },
  ],
  variable: [
    { id: 10, name: "طعام ومشتريات", budget: 400, color: "#f59e0b", icon: "🛒" },
    { id: 11, name: "تعبئة وقود", budget: 120, color: "#3b82f6", icon: "⛽" },
    { id: 12, name: "مصاريف متغيرة أخرى", budget: 261, color: "#8b5cf6", icon: "💳" },
    { id: 13, name: "طوارئ", budget: 87, color: "#ef4444", icon: "🚨" },
    { id: 14, name: "توفير", budget: 123, color: "#10b981", icon: "💰" },
  ],
};

const ICONS = ["🛒","⛽","💳","🚨","💰","🏠","🎓","🍔","💊","✈️","👕","📱","🎮","🐾","🧾"];
const COLORS = ["#f59e0b","#3b82f6","#8b5cf6","#ef4444","#10b981","#ec4899","#06b6d4","#f97316","#84cc16","#6366f1"];
const MONTHS_AR = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];

function getMonthKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;}
function getMonthLabel(k){const[y,m]=k.split("-");return `${MONTHS_AR[parseInt(m)-1]} ${y}`;}
function lsGet(key,fb){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fb;}catch{return fb;}}
function lsSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}

function App(){
  const now = new Date();
  const currentKey = getMonthKey(now);

  const [config, setConfig] = useState(()=>lsGet("budget_config", DEFAULT_CONFIG));
  const [allData, setAllData] = useState(()=>lsGet("budget_data", {}));
  const [selectedMonth, setSelectedMonth] = useState(currentKey);
  const [activeTab, setActiveTab] = useState("dashboard");
  const [showMonthPicker, setShowMonthPicker] = useState(false);
  const [saveFlash, setSaveFlash] = useState("");

  const [editIncome, setEditIncome] = useState(false);
  const [incomeInput, setIncomeInput] = useState(config.income);
  const [newFixed, setNewFixed] = useState({name:"",amount:""});
  const [newVar, setNewVar] = useState({name:"",budget:"",icon:"💳",color:"#8b5cf6"});
  const [editingFixed, setEditingFixed] = useState(null);
  const [editingVar, setEditingVar] = useState(null);
  const [settingsMsg, setSettingsMsg] = useState("");

  const [form, setForm] = useState({desc:"",amount:"",category:config.variable[0]?.name||"",date:now.toISOString().split("T")[0]});
  const [formError, setFormError] = useState("");

  const [reportText, setReportText] = useState("");
  const [reportLoading, setReportLoading] = useState(false);
  const [gmailStatus, setGmailStatus] = useState("");

  const expenses = allData[selectedMonth] || [];
  const totalFixed = config.fixed.reduce((s,i)=>s+i.amount,0);
  const totalVarBudget = config.variable.reduce((s,i)=>s+i.budget,0);
  const totalSpent = expenses.reduce((s,e)=>s+e.amount,0);
  const remaining = totalVarBudget - totalSpent;
  const spent = (cat)=>expenses.filter(e=>e.category===cat).reduce((s,e)=>s+e.amount,0);

  const flash = (msg)=>{setSettingsMsg(msg);setTimeout(()=>setSettingsMsg(""),2500);};
  const flashSave = ()=>{setSaveFlash("✅ تم الحفظ");setTimeout(()=>setSaveFlash(""),2000);};

  const persistConfig = (c)=>{setConfig(c);lsSet("budget_config",c);flash("✅ تم الحفظ");};
  const persistData = (d)=>{setAllData(d);lsSet("budget_data",d);flashSave();};

  const allMonths = [...new Set([...Object.keys(allData).filter(k=>(allData[k]||[]).length>0), currentKey])].sort((a,b)=>b.localeCompare(a));

  const addExpense = ()=>{
    if(!form.desc.trim()){setFormError("أدخل وصف المصروف");return;}
    if(!form.amount||isNaN(form.amount)||Number(form.amount)<=0){setFormError("أدخل مبلغاً صحيحاً");return;}
    const updated={...allData,[selectedMonth]:[{id:Date.now(),...form,amount:Number(form.amount)},...(allData[selectedMonth]||[])]};
    persistData(updated);
    setForm({desc:"",amount:"",category:config.variable[0]?.name||"",date:now.toISOString().split("T")[0]});
    setFormError("");setActiveTab("dashboard");
  };
  const deleteExpense=(id)=>persistData({...allData,[selectedMonth]:expenses.filter(e=>e.id!==id)});

  const updateIncome=()=>{persistConfig({...config,income:Number(incomeInput)});setEditIncome(false);};
  const addFixed=()=>{if(!newFixed.name.trim()||!newFixed.amount||isNaN(newFixed.amount))return;persistConfig({...config,fixed:[...config.fixed,{id:Date.now(),name:newFixed.name.trim(),amount:Number(newFixed.amount)}]});setNewFixed({name:"",amount:""});};
  const deleteFixed=(id)=>persistConfig({...config,fixed:config.fixed.filter(f=>f.id!==id)});
  const saveEditFixed=()=>{persistConfig({...config,fixed:config.fixed.map(f=>f.id===editingFixed.id?{...f,name:editingFixed.name,amount:Number(editingFixed.amount)}:f)});setEditingFixed(null);};
  const addVar=()=>{if(!newVar.name.trim()||!newVar.budget||isNaN(newVar.budget))return;persistConfig({...config,variable:[...config.variable,{id:Date.now(),name:newVar.name.trim(),budget:Number(newVar.budget),icon:newVar.icon,color:newVar.color}]});setNewVar({name:"",budget:"",icon:"💳",color:"#8b5cf6"});};
  const deleteVar=(id)=>persistConfig({...config,variable:config.variable.filter(v=>v.id!==id)});
  const saveEditVar=()=>{persistConfig({...config,variable:config.variable.map(v=>v.id===editingVar.id?{...v,...editingVar,budget:Number(editingVar.budget)}:v)});setEditingVar(null);};

  const generateReport=async()=>{
    setReportLoading(true);setReportText("");
    const rows=config.variable.map(v=>({name:v.name,budget:v.budget,spent:spent(v.name),remaining:v.budget-spent(v.name)}));
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`أنت مستشار مالي. اكتب تقرير ميزانية شهري احترافي بالعربية لشهر ${getMonthLabel(selectedMonth)}. الراتب: ${config.income} | الثابت: ${totalFixed} | المنفق: ${totalSpent.toFixed(2)} | المتبقي: ${remaining.toFixed(2)}. البنود: ${rows.map(r=>`${r.name}: ميزانية ${r.budget}، منفق ${r.spent.toFixed(2)}، متبقي ${r.remaining.toFixed(2)}`).join(" | ")}. المصاريف (${expenses.length}): ${expenses.slice(0,20).map(e=>`${e.date}: ${e.desc} ${e.amount}`).join(" | ")}. اكتب: ١-ملخص ٢-أبرز الملاحظات ٣-البنود المتجاوزة ٤-نصائح للشهر القادم`}]})});
      const data=await res.json();
      setReportText(data.content?.map(i=>i.text||"").join("")||"تعذر إنشاء التقرير");
    }catch{setReportText("حدث خطأ، حاول مرة أخرى.");}
    setReportLoading(false);
  };

  const sendGmailDraft=async()=>{
    setGmailStatus("loading");
    const rows=config.variable.map(v=>({name:v.name,budget:v.budget,spent:spent(v.name),remaining:v.budget-spent(v.name)}));
    const body=`تقرير المصاريف الأسبوعي - ${getMonthLabel(selectedMonth)}\n\nالراتب: ${config.income} | الثابت: ${totalFixed} | المنفق: ${totalSpent.toFixed(2)} | المتبقي: ${remaining.toFixed(2)}\n\nتفاصيل البنود:\n${rows.map(r=>`• ${r.name}: ميزانية ${r.budget}، منفق ${r.spent.toFixed(2)}، متبقي ${r.remaining.toFixed(2)} ${r.remaining<0?"⚠️":"✅"}`).join("\n")}\n\nآخر المصاريف:\n${expenses.slice(0,20).map(e=>`• ${e.date} | ${e.desc} | ${e.category} | ${e.amount}`).join("\n")}`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,mcp_servers:[{type:"url",url:"https://gmailmcp.googleapis.com/mcp/v1",name:"gmail"}],messages:[{role:"user",content:`Create a Gmail draft: subject="📊 تقرير المصاريف الأسبوعي - ${getMonthLabel(selectedMonth)}", body="${body}". Reply only: SUCCESS or FAILED`}]})});
      const data=await res.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"";
      setGmailStatus(text.toLowerCase().includes("success")?"success":"error");
    }catch{setGmailStatus("error");}
    setTimeout(()=>setGmailStatus(""),4000);
  };

  const C=(extra={})=>({background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:16,...extra});
  const I=(extra={})=>({width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"9px 12px",color:"#e2e8f0",fontSize:13,fontFamily:"'Cairo',sans-serif",outline:"none",boxSizing:"border-box",...extra});
  const B=(bg,extra={})=>({background:bg,border:"none",borderRadius:9,padding:"8px 14px",color:"#fff",fontSize:12,fontFamily:"'Cairo',sans-serif",fontWeight:700,cursor:"pointer",...extra});
  const TABS=[["dashboard","📊"],["add","➕"],["history","📋"],["report","📄"],["settings","⚙️"]];
  const TL={dashboard:"لوحة التحكم",add:"إضافة",history:"السجل",report:"التقرير",settings:"الإعدادات"};

  return (
    <div style={{direction:"rtl",fontFamily:"'Cairo',sans-serif",minHeight:"100vh",background:"linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%)",color:"#e2e8f0"}}>

      {/* Header */}
      <div className="no-print" style={{background:"rgba(255,255,255,0.04)",borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"14px 18px"}}>
        <div style={{maxWidth:620,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div>
              <h1 style={{margin:0,fontSize:19,fontWeight:900,background:"linear-gradient(90deg,#a78bfa,#60a5fa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ميزانيتي الشهرية</h1>
              <span style={{fontSize:10,color:"#10b981"}}>{saveFlash||"💾 البيانات محفوظة تلقائياً"}</span>
            </div>
            <div style={{background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.3)",borderRadius:10,padding:"6px 14px",textAlign:"center"}}>
              <p style={{margin:0,fontSize:10,color:"#6ee7b7"}}>الراتب</p>
              <p style={{margin:0,fontSize:18,fontWeight:900,color:"#10b981"}}>{config.income}</p>
            </div>
          </div>
          <div style={{position:"relative"}}>
            <button onClick={()=>setShowMonthPicker(!showMonthPicker)} style={{width:"100%",background:"rgba(124,58,237,0.15)",border:"1px solid rgba(124,58,237,0.4)",borderRadius:10,padding:"8px 14px",color:"#c4b5fd",fontSize:13,fontFamily:"'Cairo',sans-serif",fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span>📅 {getMonthLabel(selectedMonth)}</span>
              <span style={{fontSize:11,color:"#7c3aed"}}>{selectedMonth===currentKey?"الشهر الحالي":"شهر سابق"} ▼</span>
            </button>
            {showMonthPicker&&(
              <div style={{position:"absolute",top:"110%",right:0,left:0,background:"#1e1b4b",border:"1px solid rgba(124,58,237,0.4)",borderRadius:10,zIndex:100,overflow:"hidden",boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}}>
                {allMonths.map(k=>(
                  <button key={k} onClick={()=>{setSelectedMonth(k);setShowMonthPicker(false);}} style={{width:"100%",padding:"10px 16px",background:k===selectedMonth?"rgba(124,58,237,0.3)":"transparent",border:"none",borderBottom:"1px solid rgba(255,255,255,0.05)",color:k===selectedMonth?"#c4b5fd":"#94a3b8",fontSize:13,fontFamily:"'Cairo',sans-serif",cursor:"pointer",textAlign:"right"}}>
                    {getMonthLabel(k)} {k===currentKey?"🟢":""}
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="no-print" style={{maxWidth:620,margin:"0 auto",padding:"12px 18px 0"}}>
        <div style={{display:"flex",gap:5,background:"rgba(255,255,255,0.05)",borderRadius:12,padding:4}}>
          {TABS.map(([tab,icon])=>(
            <button key={tab} onClick={()=>setActiveTab(tab)} style={{flex:1,padding:"9px 2px",borderRadius:9,border:"none",cursor:"pointer",fontSize:16,transition:"all 0.2s",background:activeTab===tab?"linear-gradient(135deg,#7c3aed,#2563eb)":"transparent",color:activeTab===tab?"#fff":"#94a3b8"}}>{icon}</button>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-around",marginTop:3}}>
          {TABS.map(([tab])=>(
            <span key={tab} style={{fontSize:9,color:activeTab===tab?"#c4b5fd":"#475569",flex:1,textAlign:"center"}}>{TL[tab]}</span>
          ))}
        </div>
      </div>

      <div style={{maxWidth:620,margin:"0 auto",padding:"12px 18px 40px"}}>

        {/* DASHBOARD */}
        {activeTab==="dashboard"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[{label:"ثابت",value:totalFixed,color:"#f59e0b",bg:"rgba(245,158,11,0.1)",border:"rgba(245,158,11,0.3)"},{label:"منفق",value:totalSpent.toFixed(2),color:"#ef4444",bg:"rgba(239,68,68,0.1)",border:"rgba(239,68,68,0.3)"},{label:"متبقي",value:remaining.toFixed(2),color:remaining>=0?"#10b981":"#ef4444",bg:remaining>=0?"rgba(16,185,129,0.1)":"rgba(239,68,68,0.1)",border:remaining>=0?"rgba(16,185,129,0.3)":"rgba(239,68,68,0.3)"}].map(c=>(
                <div key={c.label} style={{background:c.bg,border:`1px solid ${c.border}`,borderRadius:12,padding:"11px 8px",textAlign:"center"}}>
                  <p style={{margin:0,fontSize:10,color:"#94a3b8",marginBottom:3}}>{c.label}</p>
                  <p style={{margin:0,fontSize:16,fontWeight:900,color:c.color}}>{c.value}</p>
                </div>
              ))}
            </div>
            <div style={C()}>
              <h3 style={{margin:"0 0 12px",fontSize:13,fontWeight:700,color:"#c4b5fd"}}>البنود المتغيرة — {getMonthLabel(selectedMonth)}</h3>
              {config.variable.map(v=>{const s=spent(v.name);const p=Math.min((s/v.budget)*100,100);const over=s>v.budget;return(
                <div key={v.id} style={{marginBottom:13}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:13,fontWeight:600}}>{v.icon} {v.name}</span>
                    <span style={{fontSize:12}}><span style={{color:over?"#ef4444":"#e2e8f0",fontWeight:700}}>{s.toFixed(2)}</span><span style={{color:"#64748b"}}> / {v.budget}</span></span>
                  </div>
                  <div style={{height:7,background:"rgba(255,255,255,0.08)",borderRadius:99,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${p}%`,background:over?"#ef4444":v.color,borderRadius:99}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
                    <span style={{fontSize:10,color:"#64748b"}}>{p.toFixed(0)}%</span>
                    <span style={{fontSize:10,color:over?"#ef4444":"#10b981"}}>{over?`⚠️ تجاوز بـ ${(s-v.budget).toFixed(2)}`:`✅ متبقي ${(v.budget-s).toFixed(2)}`}</span>
                  </div>
                </div>
              );})}
            </div>
            <div style={C()}>
              <h3 style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:"#fbbf24"}}>📌 المصاريف الثابتة</h3>
              {config.fixed.map(f=>(
                <div key={f.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                  <span style={{fontSize:13,color:"#cbd5e1"}}>{f.name}</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#fbbf24"}}>{f.amount}</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,marginTop:4}}>
                <span style={{fontSize:13,fontWeight:700}}>الإجمالي</span>
                <span style={{fontSize:15,fontWeight:900,color:"#fbbf24"}}>{totalFixed}</span>
              </div>
            </div>
          </div>
        )}

        {/* ADD */}
        {activeTab==="add"&&(
          <div style={{...C(),display:"flex",flexDirection:"column",gap:13}}>
            <h3 style={{margin:0,fontSize:15,fontWeight:700,color:"#a78bfa"}}>➕ إضافة مصروف — {getMonthLabel(selectedMonth)}</h3>
            {formError&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,padding:"9px 13px",fontSize:13,color:"#fca5a5"}}>{formError}</div>}
            {[{label:"الوصف",key:"desc",type:"text",ph:"مثال: سوبرماركت"},{label:"المبلغ",key:"amount",type:"number",ph:"0.00"}].map(f=>(
              <div key={f.key}>
                <label style={{fontSize:12,color:"#94a3b8",display:"block",marginBottom:5}}>{f.label}</label>
                <input type={f.type} placeholder={f.ph} value={form[f.key]} onChange={e=>setForm({...form,[f.key]:e.target.value})} style={I()}/>
              </div>
            ))}
            <div>
              <label style={{fontSize:12,color:"#94a3b8",display:"block",marginBottom:5}}>الفئة</label>
              <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={{...I(),background:"#1e1b4b"}}>
                {config.variable.map(v=><option key={v.id} value={v.name}>{v.icon} {v.name}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:12,color:"#94a3b8",display:"block",marginBottom:5}}>التاريخ</label>
              <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} style={I()}/>
            </div>
            <button onClick={addExpense} style={B("linear-gradient(135deg,#7c3aed,#2563eb)",{padding:"12px",fontSize:14,borderRadius:12,width:"100%"})}>✅ حفظ المصروف</button>
          </div>
        )}

        {/* HISTORY */}
        {activeTab==="history"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <h3 style={{margin:0,fontSize:14,fontWeight:700,color:"#a78bfa"}}>📋 السجل — {getMonthLabel(selectedMonth)}</h3>
              <span style={{fontSize:12,color:"#64748b"}}>{expenses.length} عملية • {totalSpent.toFixed(2)}</span>
            </div>
            {expenses.length===0?(
              <div style={{...C(),textAlign:"center",padding:36,color:"#64748b"}}>
                <p style={{fontSize:28,margin:"0 0 8px"}}>📭</p>
                <p style={{margin:0,fontSize:14}}>لا توجد مصاريف لهذا الشهر</p>
                <button onClick={()=>setActiveTab("add")} style={{...B("linear-gradient(135deg,#7c3aed,#2563eb)"),marginTop:12,padding:"9px 18px",fontSize:13}}>➕ أضف أول مصروف</button>
              </div>
            ):expenses.map(e=>{const cat=config.variable.find(v=>v.name===e.category);return(
              <div key={e.id} style={{...C({padding:"11px 15px"}),display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontSize:14,fontWeight:700}}>{e.desc}</p>
                  <div style={{display:"flex",gap:7,marginTop:4,alignItems:"center"}}>
                    <span style={{fontSize:10,background:`${cat?.color||"#94a3b8"}22`,color:cat?.color||"#94a3b8",border:`1px solid ${cat?.color||"#94a3b8"}44`,borderRadius:6,padding:"2px 7px"}}>{cat?.icon} {e.category}</span>
                    <span style={{fontSize:11,color:"#64748b"}}>{e.date}</span>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:9}}>
                  <span style={{fontSize:15,fontWeight:900,color:"#ef4444"}}>-{e.amount}</span>
                  <button onClick={()=>deleteExpense(e.id)} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:8,padding:"3px 9px",color:"#fca5a5",cursor:"pointer",fontSize:12,fontFamily:"'Cairo',sans-serif"}}>حذف</button>
                </div>
              </div>
            );})}
          </div>
        )}

        {/* REPORT */}
        {activeTab==="report"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div className="no-print" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <h3 style={{margin:0,fontSize:14,fontWeight:700,color:"#a78bfa"}}>📄 التقرير — {getMonthLabel(selectedMonth)}</h3>
              <div style={{display:"flex",gap:7}}>
                <button onClick={generateReport} style={B("rgba(124,58,237,0.3)",{border:"1px solid rgba(124,58,237,0.5)",color:"#c4b5fd"})}>🔄 تحديث</button>
                <button onClick={()=>window.print()} style={B("linear-gradient(135deg,#7c3aed,#2563eb)")}>🖨️ PDF</button>
              </div>
            </div>
            <div style={{background:"rgba(234,67,53,0.08)",border:"1px solid rgba(234,67,53,0.25)",borderRadius:14,padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <p style={{margin:0,fontSize:13,fontWeight:700,color:"#fca5a5"}}>📧 تقرير أسبوعي على Gmail</p>
                  <p style={{margin:"3px 0 0",fontSize:11,color:"#94a3b8"}}>إنشاء مسودة جاهزة في بريدك</p>
                </div>
                <button onClick={sendGmailDraft} disabled={gmailStatus==="loading"} style={B("linear-gradient(135deg,#ea4335,#c62828)",{padding:"10px 16px",opacity:gmailStatus==="loading"?0.7:1})}>
                  {gmailStatus==="loading"?"⏳...":gmailStatus==="success"?"✅ تم!":gmailStatus==="error"?"❌ خطأ":"📤 إرسال"}
                </button>
              </div>
              {gmailStatus==="success"&&<p style={{margin:"8px 0 0",fontSize:12,color:"#6ee7b7"}}>✅ المسودة جاهزة في Gmail!</p>}
              {gmailStatus==="error"&&<p style={{margin:"8px 0 0",fontSize:12,color:"#fca5a5"}}>⚠️ تعذر الإنشاء، حاول مرة أخرى.</p>}
            </div>
            <div className="print-area" style={C({padding:18})}>
              <h4 style={{margin:"0 0 10px",fontSize:13,color:"#60a5fa"}}>ملخص الشهر</h4>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                {[{label:"الراتب",value:config.income,color:"#10b981"},{label:"المصاريف الثابتة",value:totalFixed,color:"#f59e0b"},{label:"إجمالي المنفق",value:totalSpent.toFixed(2),color:"#ef4444"},{label:"المتبقي",value:remaining.toFixed(2),color:remaining>=0?"#10b981":"#ef4444"}].map(r=>(
                  <div key={r.label} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"9px 12px"}}>
                    <p style={{margin:0,fontSize:11,color:"#94a3b8"}}>{r.label}</p>
                    <p style={{margin:0,fontSize:17,fontWeight:900,color:r.color}}>{r.value}</p>
                  </div>
                ))}
              </div>
              <h4 style={{margin:"0 0 8px",fontSize:13,color:"#60a5fa"}}>تفاصيل البنود</h4>
              <table style={{width:"100%",borderCollapse:"collapse",marginBottom:14,fontSize:12}}>
                <thead><tr style={{borderBottom:"1px solid rgba(255,255,255,0.1)"}}>
                  {["البند","الميزانية","المنفق","المتبقي","الحالة"].map(h=><th key={h} style={{padding:"7px 5px",color:"#94a3b8",fontWeight:600,textAlign:"right"}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {config.variable.map(v=>{const s=spent(v.name);const r=v.budget-s;return(
                    <tr key={v.id} style={{borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                      <td style={{padding:"7px 5px"}}>{v.icon} {v.name}</td>
                      <td style={{padding:"7px 5px",color:"#94a3b8"}}>{v.budget}</td>
                      <td style={{padding:"7px 5px",color:"#ef4444",fontWeight:700}}>{s.toFixed(2)}</td>
                      <td style={{padding:"7px 5px",color:r>=0?"#10b981":"#ef4444",fontWeight:700}}>{r.toFixed(2)}</td>
                      <td style={{padding:"7px 5px",fontSize:11}}>{r>=0?"✅":"⚠️"}</td>
                    </tr>
                  );})}
                </tbody>
              </table>
              <h4 style={{margin:"0 0 8px",fontSize:13,color:"#60a5fa"}}>التحليل الذكي</h4>
              {!reportText?(
                <button onClick={generateReport} style={B("linear-gradient(135deg,#7c3aed,#2563eb)",{width:"100%",padding:"12px",fontSize:13,borderRadius:12})}>🤖 إنشاء التحليل</button>
              ):reportLoading?(
                <div style={{textAlign:"center",padding:24,color:"#94a3b8"}}><p style={{margin:0}}>⏳ جاري التحليل...</p></div>
              ):(
                <div style={{fontSize:13,lineHeight:1.9,color:"#cbd5e1",whiteSpace:"pre-wrap"}}>{reportText}</div>
              )}
            </div>
          </div>
        )}

        {/* SETTINGS */}
        {activeTab==="settings"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <h3 style={{margin:0,fontSize:15,fontWeight:700,color:"#a78bfa"}}>⚙️ الإعدادات</h3>
            {settingsMsg&&<div style={{background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.3)",borderRadius:10,padding:"9px 14px",fontSize:13,color:"#6ee7b7"}}>{settingsMsg}</div>}
            <div style={C()}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:editIncome?12:0}}>
                <h4 style={{margin:0,fontSize:13,color:"#fbbf24"}}>💵 الراتب الشهري</h4>
                <button onClick={()=>setEditIncome(!editIncome)} style={B(editIncome?"rgba(239,68,68,0.2)":"rgba(251,191,36,0.2)",{color:editIncome?"#fca5a5":"#fbbf24",border:`1px solid ${editIncome?"rgba(239,68,68,0.3)":"rgba(251,191,36,0.3)"}`})}>{editIncome?"إلغاء":"تعديل"}</button>
              </div>
              {editIncome?(
                <div style={{display:"flex",gap:8}}>
                  <input type="number" value={incomeInput} onChange={e=>setIncomeInput(e.target.value)} style={{...I(),flex:1}}/>
                  <button onClick={updateIncome} style={B("linear-gradient(135deg,#7c3aed,#2563eb)",{padding:"9px 16px"})}>حفظ</button>
                </div>
              ):(<p style={{margin:"8px 0 0",fontSize:22,fontWeight:900,color:"#10b981"}}>{config.income}</p>)}
            </div>
            <div style={C()}>
              <h4 style={{margin:"0 0 12px",fontSize:13,color:"#fbbf24"}}>📌 المصاريف الثابتة</h4>
              {config.fixed.map(f=>(
                <div key={f.id} style={{marginBottom:8}}>
                  {editingFixed?.id===f.id?(
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <input value={editingFixed.name} onChange={e=>setEditingFixed({...editingFixed,name:e.target.value})} style={{...I(),flex:2}}/>
                      <input type="number" value={editingFixed.amount} onChange={e=>setEditingFixed({...editingFixed,amount:e.target.value})} style={{...I(),flex:1}}/>
                      <button onClick={saveEditFixed} style={B("linear-gradient(135deg,#7c3aed,#2563eb)",{padding:"8px 10px"})}>✅</button>
                      <button onClick={()=>setEditingFixed(null)} style={B("rgba(239,68,68,0.2)",{color:"#fca5a5",border:"1px solid rgba(239,68,68,0.3)",padding:"8px 10px"})}>✕</button>
                    </div>
                  ):(
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.03)",borderRadius:9,padding:"8px 12px"}}>
                      <span style={{fontSize:13}}>{f.name} <span style={{color:"#fbbf24",fontWeight:700}}>({f.amount})</span></span>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setEditingFixed({...f})} style={B("rgba(124,58,237,0.2)",{color:"#c4b5fd",border:"1px solid rgba(124,58,237,0.3)",padding:"4px 10px"})}>✏️</button>
                        <button onClick={()=>deleteFixed(f.id)} style={B("rgba(239,68,68,0.15)",{color:"#fca5a5",border:"1px solid rgba(239,68,68,0.3)",padding:"4px 10px"})}>🗑️</button>
                      </div>
                    </div>
                  )}
                </div>
              ))}
              <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:10,marginTop:6}}>
                <p style={{margin:"0 0 7px",fontSize:12,color:"#94a3b8"}}>➕ إضافة بند ثابت</p>
                <div style={{display:"flex",gap:6}}>
                  <input placeholder="الاسم" value={newFixed.name} onChange={e=>setNewFixed({...newFixed,name:e.target.value})} style={{...I(),flex:2}}/>
                  <input type="number" placeholder="المبلغ" value={newFixed.amount} onChange={e=>setNewFixed({...newFixed,amount:e.target.value})} style={{...I(),flex:1}}/>
                  <button onClick={addFixed} style={B("linear-gradient(135deg,#7c3aed,#2563eb)",{padding:"8px 12px"})}>إضافة</button>
                </div>
              </div>
            </div>
            <div style={C()}>
              <h4 style={{margin:"0 0 12px",fontSize:13,color:"#c4b5fd"}}>📂 البنود المتغيرة</h4>
              {config.variable.map(v=>(
                <div key={v.id} style={{marginBottom:8}}>
                  {editingVar?.id===v.id?(
                    <div style={{display:"flex",flexDirection:"column",gap:6,background:"rgba(255,255,255,0.04)",borderRadius:10,padding:10}}>
                      <div style={{display:"flex",gap:6}}>
                        <input value={editingVar.name} onChange={e=>setEditingVar({...editingVar,name:e.target.value})} style={{...I(),flex:2}}/>
                        <input type="number" value={editingVar.budget} onChange={e=>setEditingVar({...editingVar,budget:e.target.value})} style={{...I(),flex:1}}/>
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                        {ICONS.map(ic=><button key={ic} onClick={()=>setEditingVar({...editingVar,icon:ic})} style={{background:editingVar.icon===ic?"rgba(124,58,237,0.4)":"rgba(255,255,255,0.05)",border:editingVar.icon===ic?"1px solid #7c3aed":"1px solid transparent",borderRadius:6,padding:"4px 6px",cursor:"pointer",fontSize:14}}>{ic}</button>)}
                      </div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {COLORS.map(c=><button key={c} onClick={()=>setEditingVar({...editingVar,color:c})} style={{width:22,height:22,borderRadius:"50%",background:c,border:editingVar.color===c?"2px solid white":"2px solid transparent",cursor:"pointer"}}/>)}
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={saveEditVar} style={B("linear-gradient(135deg,#7c3aed,#2563eb)",{flex:1,padding:"9px"})}>✅ حفظ</button>
                        <button onClick={()=>setEditingVar(null)} style={B("rgba(239,68,68,0.2)",{color:"#fca5a5",border:"1px solid rgba(239,68,68,0.3)",padding:"9px 14px"})}>إلغاء</button>
                      </div>
                    </div>
                  ):(
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.03)",borderRadius:9,padding:"8px 12px"}}>
                      <span style={{fontSize:13}}>{v.icon} {v.name} <span style={{color:v.color,fontWeight:700}}>({v.budget})</span></span>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setEditingVar({...v})} style={B("rgba(124,58,237,0.2)",{color:"#c4b5fd",border:"1px solid rgba(124,58,237,0.3)",padding:"4px 10px"})}>✏️</button>
                        <button onClick={()=>deleteVar(v.id)} style={B("rgba(239,68,68,0.15)",{color:"#fca5a5",border:"1px solid rgba(239,68,68,0.3)",padding:"4px 10px"})}>🗑️</button>
                      </div>
                    </div>
                  )}
                </div>
              ))}
              <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:10,marginTop:6}}>
                <p style={{margin:"0 0 7px",fontSize:12,color:"#94a3b8"}}>➕ إضافة بند متغير</p>
                <div style={{display:"flex",gap:6,marginBottom:7}}>
                  <input placeholder="الاسم" value={newVar.name} onChange={e=>setNewVar({...newVar,name:e.target.value})} style={{...I(),flex:2}}/>
                  <input type="number" placeholder="الميزانية" value={newVar.budget} onChange={e=>setNewVar({...newVar,budget:e.target.value})} style={{...I(),flex:1}}/>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:7}}>
                  {ICONS.map(ic=><button key={ic} onClick={()=>setNewVar({...newVar,icon:ic})} style={{background:newVar.icon===ic?"rgba(124,58,237,0.4)":"rgba(255,255,255,0.05)",border:newVar.icon===ic?"1px solid #7c3aed":"1px solid transparent",borderRadius:6,padding:"4px 6px",cursor:"pointer",fontSize:14}}>{ic}</button>)}
                </div>
                <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
                  {COLORS.map(c=><button key={c} onClick={()=>setNewVar({...newVar,color:c})} style={{width:22,height:22,borderRadius:"50%",background:c,border:newVar.color===c?"2px solid white":"2px solid transparent",cursor:"pointer"}}/>)}
                </div>
                <button onClick={addVar} style={B("linear-gradient(135deg,#7c3aed,#2563eb)",{width:"100%",padding:"10px",fontSize:13,borderRadius:10})}>➕ إضافة البند</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
